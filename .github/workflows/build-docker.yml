name: Build and Deploy

on:
  push:
    branches:
      - main
      - '**'
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Determine registry
        id: registry
        run: |
          SERVER_URL="${{ github.server_url }}"
          HOST=$(echo "$SERVER_URL" | sed 's|https\?://||')
          if [ "$HOST" = "github.com" ]; then
            REGISTRY="ghcr.io"
          else
            REGISTRY="$HOST"
          fi
          echo "registry=${REGISTRY}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ steps.registry.outputs.registry }}
          username: ${{ github.actor }}
          password: ${{ secrets.REGISTRY_ACCESS_TOKEN || github.token }}

      - name: Determine image tags
        id: tags
        run: |
          IMAGE="${{ steps.registry.outputs.registry }}/${{ github.repository }}"
          IMAGE=$(echo "$IMAGE" | tr '[:upper:]' '[:lower:]')
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            TAGS="${IMAGE}:latest,${IMAGE}:$(date '+%Y%m%d')"
          else
            TAGS="${IMAGE}:dev"
          fi
          echo "tags=${TAGS}" >> $GITHUB_OUTPUT
          echo "cache=${IMAGE}:buildcache" >> $GITHUB_OUTPUT
          echo "image=${IMAGE}" >> $GITHUB_OUTPUT

      - name: Build and push image
        id: build
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          labels: |
            build.buildnumber=${{ github.run_id }}
            build.builduri=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            build.project.uri=${{ github.server_url }}/${{ github.repository }}
            build.project.name=${{ github.repository }}
            build.repository.name=${{ github.event.repository.name }}
            build.repository.branch=${{ github.ref_name }}
            build.repository.commithash=${{ github.sha }}
          cache-from: type=registry,ref=${{ steps.tags.outputs.cache }}
          cache-to: type=registry,ref=${{ steps.tags.outputs.cache }},mode=max

  helm-push:
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Determine registry
        id: registry
        run: |
          SERVER_URL="${{ github.server_url }}"
          HOST=$(echo "$SERVER_URL" | sed 's|https\?://||')
          if [ "$HOST" = "github.com" ]; then
            REGISTRY="ghcr.io"
          else
            REGISTRY="$HOST"
          fi
          echo "registry=${REGISTRY}" >> $GITHUB_OUTPUT

      - name: Install Helm
        uses: azure/setup-helm@5119fcb9089d432beecbf79bb2c7915207344b78 # v3

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Log in to Helm Registry
        run: |
          echo "${{ secrets.REGISTRY_ACCESS_TOKEN || github.token }}" | helm registry login ${{ steps.registry.outputs.registry }} -u "${{ github.actor }}" --password-stdin

      - name: Determine Helm repository
        id: helm-repo
        run: |
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "repo=${REPO}" >> $GITHUB_OUTPUT
            echo "tag_suffix=$(date '+%Y%m%d')" >> $GITHUB_OUTPUT
          else
            echo "repo=${REPO}" >> $GITHUB_OUTPUT
            echo "tag_suffix=dev" >> $GITHUB_OUTPUT
          fi

      - name: Update and push Helm chart
        env:
          REGISTRY: ${{ steps.registry.outputs.registry }}
          IMAGE_DIGEST: ${{ needs.build.outputs.digest }}
          TAG_SUFFIX: ${{ steps.helm-repo.outputs.tag_suffix }}
          HELM_REPO: ${{ steps.helm-repo.outputs.repo }}
        run: |
          CHART_DIR=".cluster/scam"
          CHART_NAME="scam"

          OCI_NAME="helm"

          # Pull current chart to get version
          helm pull oci://${REGISTRY}/${HELM_REPO}/${OCI_NAME} || echo "No existing chart found"

          if ls ${OCI_NAME}-*.tgz 1>/dev/null 2>&1; then
            file=$(ls ${OCI_NAME}-*.tgz)
            CURRENT_VERSION=$(echo $file | sed "s/${OCI_NAME}-\([0-9]\+\.[0-9]\+\.[0-9]\+\).tgz/\1/")
            NEW_VERSION=$(echo $CURRENT_VERSION | awk -F. '{print $1"."$2"."$3+1}')
          else
            NEW_VERSION="0.1.0"
          fi

          echo "NEW CHART VERSION: $NEW_VERSION"

          # Update Chart.yaml — set OCI artifact name and version
          yq e -i ".name = \"$OCI_NAME\" | .version = \"$NEW_VERSION\"" ${CHART_DIR}/Chart.yaml

          # Update values.yaml with image repository, tag, and digest
          IMAGE_REPO="${REGISTRY}/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          IMAGE_TAG="${TAG_SUFFIX}@${IMAGE_DIGEST}"
          yq e -i ".image.repository = \"$IMAGE_REPO\"" ${CHART_DIR}/values.yaml
          yq e -i ".image.tag = \"$IMAGE_TAG\"" ${CHART_DIR}/values.yaml

          # Package and push — helm appends the chart name from Chart.yaml,
          # so pushing to oci://registry/org/scam with name=helm lands at scam/helm
          helm package ${CHART_DIR}
          helm push "${OCI_NAME}-${NEW_VERSION}.tgz" oci://${REGISTRY}/${HELM_REPO}
