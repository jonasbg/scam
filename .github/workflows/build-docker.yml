name: Build and Deploy

# Dev/CI path: builds an image for every branch push + PR (dev tags) and
# publishes a dev/edge Helm chart from branch pushes. Stable releases —
# semver image, stable chart, GitHub Release with notes — are owned by
# release.yml, driven by the top version in CHANGELOG.md.
on:
  push:
    branches:
      - main
      - '**'
  pull_request:

jobs:
  build:
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/image.yml
    secrets: inherit

  helm-push-dev:
    needs: build
    # Dev/edge chart from every branch push (including main). PRs are
    # skipped (they can't write secrets anyway).
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Determine registry
        id: registry
        run: |
          SERVER_URL="${{ github.server_url }}"
          HOST=$(echo "$SERVER_URL" | sed 's|https\?://||')
          if [ "$HOST" = "github.com" ]; then
            REGISTRY="ghcr.io"
          else
            REGISTRY="$HOST"
          fi
          echo "registry=${REGISTRY}" >> $GITHUB_OUTPUT

      - name: Install Helm
        uses: azure/setup-helm@5119fcb9089d432beecbf79bb2c7915207344b78 # v3

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Log in to Helm Registry
        run: |
          echo "${{ secrets.PACKAGES_TOKEN || github.token }}" | helm registry login ${{ steps.registry.outputs.registry }} -u "${{ github.actor }}" --password-stdin

      - name: Determine Helm repository
        id: helm-repo
        run: |
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "repo=${REPO}" >> $GITHUB_OUTPUT

      - name: Package and push dev Helm chart
        env:
          REGISTRY: ${{ steps.registry.outputs.registry }}
          IMAGE_NAME: ${{ needs.build.outputs.image }}
          IMAGE_DIGEST: ${{ needs.build.outputs.digest }}
          IMAGE_VERSION: ${{ needs.build.outputs.version }}
          HELM_REPO: ${{ steps.helm-repo.outputs.repo }}
        run: |
          CHART_DIR=".cluster/scam"
          OCI_NAME="helm-dev"

          # SemVer prerelease identifiers must match [0-9A-Za-z-]+.
          # Branch slug: flatten /, _, and anything else into '-'.
          SLUG=$(echo "${GITHUB_REF_NAME}" | sed 's/[^A-Za-z0-9-]/-/g')
          SHORT_SHA="${GITHUB_SHA:0:7}"
          DEV_VERSION="0.0.0-${SLUG}.${SHORT_SHA}"

          echo "DEV CHART VERSION: $DEV_VERSION"

          yq e -i ".name = \"$OCI_NAME\" | .version = \"$DEV_VERSION\"" ${CHART_DIR}/Chart.yaml

          # Pin the dev chart at the exact image this build produced.
          IMAGE_TAG="${IMAGE_VERSION}@${IMAGE_DIGEST}"
          yq e -i ".image.repository = \"$IMAGE_NAME\"" ${CHART_DIR}/values.yaml
          yq e -i ".image.tag = \"$IMAGE_TAG\"" ${CHART_DIR}/values.yaml

          helm package ${CHART_DIR}
          helm push "${OCI_NAME}-${DEV_VERSION}.tgz" oci://${REGISTRY}/${HELM_REPO}
