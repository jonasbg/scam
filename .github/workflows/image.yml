name: Build image

# Reusable build: one definition shared by the dev path (build-docker.yml)
# and the release path (release.yml). When `semver` is set the image is
# tagged with that release version + `latest`; otherwise it gets dev
# branch/PR/sha tags. The VERSION ldflag is stamped from the primary tag so
# `scam --version` always reports something real.
on:
  workflow_call:
    inputs:
      semver:
        description: "Release tag (e.g. v0.2.2). Empty for dev/branch builds."
        type: string
        default: ""
    outputs:
      image:
        description: "Fully-qualified image name (no tag)."
        value: ${{ jobs.image.outputs.image }}
      version:
        description: "Primary image tag, also stamped into the binary."
        value: ${{ jobs.image.outputs.version }}
      digest:
        description: "Pushed image digest."
        value: ${{ jobs.image.outputs.digest }}

jobs:
  image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.image.outputs.image }}
      version: ${{ steps.meta.outputs.version }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Determine registry
        id: registry
        run: |
          SERVER_URL="${{ github.server_url }}"
          HOST=$(echo "$SERVER_URL" | sed 's|https\?://||')
          if [ "$HOST" = "github.com" ]; then
            REGISTRY="ghcr.io"
          else
            REGISTRY="$HOST"
          fi
          echo "registry=${REGISTRY}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ steps.registry.outputs.registry }}
          username: ${{ github.actor }}
          password: ${{ secrets.PACKAGES_TOKEN || github.token }}

      - name: Resolve image name
        id: image
        run: |
          IMAGE="${{ steps.registry.outputs.registry }}/${{ github.repository }}"
          IMAGE=$(echo "$IMAGE" | tr '[:upper:]' '[:lower:]')
          echo "image=${IMAGE}" >> $GITHUB_OUTPUT
          echo "cache=${IMAGE}:buildcache" >> $GITHUB_OUTPUT

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.image }}
          # Release builds (semver set) get the immutable version + latest;
          # dev builds get branch/PR tags. sha tag is always added.
          tags: |
            type=raw,value=${{ inputs.semver }},enable=${{ inputs.semver != '' }}
            type=raw,value=latest,enable=${{ inputs.semver != '' }}
            type=ref,event=branch,enable=${{ inputs.semver == '' }}
            type=ref,event=pr,enable=${{ inputs.semver == '' }}
            type=sha,format=short,prefix=
          labels: |
            org.opencontainers.image.title=scam
            org.opencontainers.image.description=SPAM Cluster Agent Metadata

      - name: Build and push image
        id: build
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            COMMIT=${{ github.sha }}
          cache-from: type=registry,ref=${{ steps.image.outputs.cache }}
          cache-to: type=registry,ref=${{ steps.image.outputs.cache }},mode=max
