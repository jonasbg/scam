apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Chart.Name }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ .Release.Name }}
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            {{- if .Values.clusterName }}
            - name: CLUSTER_NAME
              value: {{ .Values.clusterName | quote }}
            {{- end }}
            {{- if .Values.environment }}
            - name: ENVIRONMENT
              value: {{ .Values.environment | quote }}
            {{- end }}
            {{- if .Values.callcenter }}
            - name: CALLCENTER_URL
              value: {{ .Values.callcenter | quote }}
            {{- end }}
            {{- if .Values.ror.enabled }}
            - name: ROR_API_ENDPOINT
              value: {{ .Values.ror.endpoint | default "https://api.ror.nhn.no" | quote }}
            {{- if .Values.ror.apiKey }}
            - name: ROR_API_KEY
              value: {{ .Values.ror.apiKey | quote }}
            {{- else }}
            - name: ROR_API_KEY_SECRET_NAMESPACE
              value: {{ .Values.ror.apiKeySecret.namespace | default .Release.Namespace | quote }}
            - name: ROR_API_KEY_SECRET_NAME
              value: {{ .Values.ror.apiKeySecret.name | quote }}
            - name: ROR_API_KEY_SECRET_KEY
              value: {{ .Values.ror.apiKeySecret.key | quote }}
            {{- end }}
            {{- end }}
            - name: GOGC
              value: "50"
            - name: GOMEMLIMIT
              value: "96MiB"
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
